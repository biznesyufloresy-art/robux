<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Robux Gift</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<div class="topbar">
  <div class="logo">ROBLOX</div>
  <div class="balance">💰 10,000,000 Robux</div>
  <button class="send">Wyślij</button>
</div>

<div class="container">

  <h1>Odbierz nawet o 25% Robuxów więcej</h1>
  <p class="sub">Wyszukaj użytkownika i wyślij wizualny gift</p>

  <div class="searchBox">
    <input id="username" placeholder="Wpisz nick Roblox">
    <button onclick="findUser()">Szukaj</button>
  </div>

  <div id="profile" class="profile hidden">
    <img id="avatar">
    <h2 id="name"></h2>

    <input id="amount" type="number" value="100000">

    <button class="giftBtn" onclick="gift()">🎁 Wyślij Robux</button>

    <p id="status"></p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
